<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legal Rag Application</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="headerDiv">
        <div class="logoimg"></div>
        <h1>Legal Rag Application</h1>
    </div>
    <div class="mainContainer">

        <div class="session">
            <div class="session-btn" onclick="newSession()">
                <span class="plus-text">+</span>
                New Session
            </div>
            <div class="session-btn docs-btn" onclick="openDocsModal()">
                <span class="plus-text" style="font-size:18px;">📄</span>
                Manage Docs
            </div>
            <div id="session-container">


            </div>
        </div>

        <div class="chat-box">
            <div id="chat-container"></div>
            <div id="input-container">
                <div type="text" id="user-input3">

                    <textarea type="text" id="user-input1" placeholder="Type a message...">  </textarea>

                    <button class="btnsend" id="send-btn">Send</button>

                </div>
            </div>
        </div>
    </div>



    <!-- Document Management Modal -->
    <div id="docs-modal" class="modal-overlay" style="display:none;">
      <div class="modal-box">
        <div class="modal-header">
          <h2>📄 Manage Knowledge Base</h2>
          <button class="modal-close" onclick="closeDocsModal()">✕</button>
        </div>

        <!-- Upload section -->
        <div class="modal-section">
          <h3>Upload Document</h3>
          <p class="modal-hint">Accepted formats: <strong>.md</strong>, <strong>.txt</strong>, <strong>.pdf</strong>, <strong>.docx</strong>. The index rebuilds automatically on the next query.</p>
          <div class="upload-row">
            <input type="file" id="doc-file-input" accept=".md,.txt,.pdf,.docx" />
            <button onclick="uploadDocument()">⬆ Upload</button>
          </div>
          <p id="upload-status" class="upload-status"></p>
        </div>

        <!-- Document list -->
        <div class="modal-section">
          <h3>Documents in Knowledge Base</h3>
          <div id="doc-list" class="doc-list"><em>Click Refresh to load.</em></div>
          <button class="refresh-btn" onclick="loadDocumentList()">🔄 Refresh List</button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>

</body>

</html>
